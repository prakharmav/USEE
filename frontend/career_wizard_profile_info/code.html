<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Career Navigator - Profile Input</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .tap-highlight-none {
            -webkit-tap-highlight-color: transparent;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "on-primary-fixed": "#001b3c",
                      "on-surface": "#1a1c1e",
                      "inverse-surface": "#2f3033",
                      "surface-container-lowest": "#ffffff",
                      "error": "#ba1a1a",
                      "secondary-fixed-dim": "#59dbc7",
                      "surface-container-highest": "#e3e2e6",
                      "surface-dim": "#dad9dd",
                      "on-primary-container": "#7ca0d9",
                      "primary-fixed-dim": "#a7c8ff",
                      "on-background": "#1a1c1e",
                      "outline-variant": "#c4c6cf",
                      "on-tertiary-container": "#00b395",
                      "on-tertiary": "#ffffff",
                      "tertiary-fixed-dim": "#38debb",
                      "outline": "#74777f",
                      "primary": "#002045",
                      "tertiary-fixed": "#5ffbd6",
                      "tertiary": "#00261e",
                      "on-secondary-container": "#006f63",
                      "on-primary-fixed-variant": "#1f477b",
                      "background": "#faf9fd",
                      "surface-bright": "#faf9fd",
                      "secondary-container": "#76f4e0",
                      "on-tertiary-fixed": "#002019",
                      "surface": "#faf9fd",
                      "inverse-primary": "#a7c8ff",
                      "error-container": "#ffdad6",
                      "on-error-container": "#93000a",
                      "tertiary-container": "#003e32",
                      "on-surface-variant": "#43474e",
                      "surface-container-low": "#f4f3f7",
                      "primary-container": "#043669",
                      "on-tertiary-fixed-variant": "#005142",
                      "surface-container-high": "#e9e7eb",
                      "primary-fixed": "#d5e3ff",
                      "surface-container": "#efedf1",
                      "inverse-on-surface": "#f1f0f4",
                      "secondary-fixed": "#79f7e3",
                      "secondary": "#006b5f",
                      "surface-tint": "#3a5f94",
                      "on-secondary-fixed-variant": "#005047",
                      "surface-variant": "#e3e2e6",
                      "on-secondary": "#ffffff",
                      "on-primary": "#ffffff",
                      "on-error": "#ffffff",
                      "on-secondary-fixed": "#00201c"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "fontFamily": {
                      "headline": ["Manrope"],
                      "body": ["Inter"],
                      "label": ["Inter"]
              }
            },
          },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body selection:bg-secondary-container selection:text-on-secondary-container">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-6 h-16 bg-[#faf9fd] dark:bg-slate-950">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-[#002045] dark:text-blue-100 cursor-pointer" data-icon="menu">menu</span>
<h1 class="text-xl font-extrabold text-[#002045] dark:text-blue-200 font-['Manrope'] tracking-tight">Career Navigator</h1>
</div>
<div class="w-8 h-8 rounded-full overflow-hidden border border-outline-variant/20">
<img alt="user profile picture" class="w-full h-full object-cover" data-alt="Close-up studio portrait of a confident young student with soft warm lighting and a neutral grey background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBfJ7_r79uRXAfDv3Q1jdBOteeJpRROlJH4D3AdRcnev1CkJkMTPy0ldbqdTg5jNPrMyT87w2epLXXJ9JavFUf1QOPu7dMg_N9S_IiLG5Td9IPvPvTNj7AcGWUmOr_MtZ1YkajKEP7HKkALL-_2OBkeqe8gP6eeG42XwHzh7MZvwZeDCP1e4Dlm1LZnNhcPiM6clh6vuFErX8THHiHlveOPzvKAhOBf6Ipi3h3A6-H0CBbud8xZE_PyI-wFBaQw1qUzau56YPzMrM77"/>
</div>
</header>
<main class="pt-20 pb-24 min-h-screen px-4 md:max-w-md mx-auto">
<!-- Progress Indicator -->
<section class="mb-8 px-2">
<div class="flex justify-between items-center mb-4">
<span class="text-xs font-bold font-headline uppercase tracking-widest text-secondary">Step 1 of 3</span>
<span class="text-xs font-medium text-on-surface-variant">Academic Profile</span>
</div>
<div class="h-1.5 w-full bg-surface-container-high rounded-full overflow-hidden">
<div class="h-full w-1/3 bg-secondary rounded-full"></div>
</div>
</section>
<!-- Intro Text -->
<header class="mb-8 px-2">
<h2 class="text-3xl font-headline font-extrabold text-primary tracking-tight leading-tight mb-2">Let's build your profile.</h2>
<p class="text-on-surface-variant text-sm leading-relaxed">Enter your academic credentials to unlock personalized university recommendations powered by AI.</p>
</header>
<!-- Step 1 Form Content -->
<div class="space-y-6">
<!-- GPA Input Card -->
<div class="bg-surface-container-low p-6 rounded-xl space-y-4">
<div class="flex items-center gap-3 mb-2">
<div class="w-10 h-10 rounded-lg bg-surface-container-lowest flex items-center justify-center text-primary shadow-sm">
<span class="material-symbols-outlined" data-icon="school">school</span>
</div>
<label class="text-sm font-bold font-headline text-primary">Academic Standing</label>
</div>
<div>
<span class="text-xs font-medium text-on-surface-variant mb-1.5 block">Undergraduate GPA (out of 4.0)</span>
<input class="w-full h-14 px-4 bg-surface-container-lowest border-none rounded-xl text-lg font-headline font-bold text-primary focus:ring-2 focus:ring-primary/20 transition-all placeholder:text-outline/40" placeholder="e.g. 3.85" step="0.01" type="number"/>
</div>
</div>
<!-- GRE Score Bento Grid-ish Layout -->
<div class="grid grid-cols-2 gap-4">
<div class="bg-surface-container-low p-5 rounded-xl">
<label class="text-xs font-bold font-headline text-on-surface-variant mb-2 block uppercase tracking-wider">GRE Quant</label>
<input class="w-full h-12 bg-transparent border-b-2 border-outline-variant focus:border-secondary focus:ring-0 text-xl font-headline font-bold text-primary transition-colors placeholder:text-outline/30" placeholder="170" type="number"/>
</div>
<div class="bg-surface-container-low p-5 rounded-xl">
<label class="text-xs font-bold font-headline text-on-surface-variant mb-2 block uppercase tracking-wider">GRE Verbal</label>
<input class="w-full h-12 bg-transparent border-b-2 border-outline-variant focus:border-secondary focus:ring-0 text-xl font-headline font-bold text-primary transition-colors placeholder:text-outline/30" placeholder="165" type="number"/>
</div>
</div>
<!-- Multi-select for Country Preferences -->
<div class="bg-surface-container-low p-6 rounded-xl">
<div class="flex items-center justify-between mb-4">
<label class="text-sm font-bold font-headline text-primary">Study Destinations</label>
<span class="text-[10px] px-2 py-1 bg-secondary-container text-on-secondary-container rounded-full font-bold">AI Recommended</span>
</div>
<div class="flex flex-wrap gap-2">
<!-- Option 1 (Selected) -->
<button class="flex items-center gap-2 px-4 py-2 bg-primary text-on-primary rounded-full text-xs font-semibold transition-transform active:scale-95">
<span class="material-symbols-outlined text-[16px]" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
                        United States
                    </button>
<!-- Option 2 -->
<button class="flex items-center gap-2 px-4 py-2 bg-surface-container-lowest text-on-surface-variant border border-outline-variant/30 rounded-full text-xs font-semibold hover:bg-surface-container-highest transition-colors active:scale-95">
                        United Kingdom
                    </button>
<!-- Option 3 -->
<button class="flex items-center gap-2 px-4 py-2 bg-surface-container-lowest text-on-surface-variant border border-outline-variant/30 rounded-full text-xs font-semibold hover:bg-surface-container-highest transition-colors active:scale-95">
                        Canada
                    </button>
<!-- Option 4 -->
<button class="flex items-center gap-2 px-4 py-2 bg-surface-container-lowest text-on-surface-variant border border-outline-variant/30 rounded-full text-xs font-semibold hover:bg-surface-container-highest transition-colors active:scale-95">
                        Germany
                    </button>
<!-- Option 5 -->
<button class="flex items-center gap-2 px-4 py-2 bg-surface-container-lowest text-on-surface-variant border border-outline-variant/30 rounded-full text-xs font-semibold hover:bg-surface-container-highest transition-colors active:scale-95">
                        Australia
                    </button>
</div>
</div>
<!-- Experience Toggle (Small Detail) -->
<div class="flex items-center justify-between p-4 bg-surface-container-lowest rounded-xl border border-outline-variant/10">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-secondary" data-icon="work">work</span>
<span class="text-sm font-medium">Include work experience?</span>
</div>
<div class="w-10 h-6 bg-secondary-container rounded-full relative flex items-center px-1">
<div class="w-4 h-4 bg-secondary rounded-full translate-x-4"></div>
</div>
</div>
</div>
</main>
<!-- Fixed Bottom Action Area -->
<div class="fixed bottom-0 left-0 w-full bg-white/60 dark:bg-slate-900/60 backdrop-blur-xl px-6 py-4 flex items-center justify-between z-50 shadow-[0_-12px_32px_rgba(26,28,30,0.06)] rounded-t-2xl">
<button class="text-on-surface-variant font-bold text-sm px-4 py-2 hover:bg-surface-container-low rounded-xl transition-colors">Skip for now</button>
<button class="flex items-center gap-2 bg-gradient-to-br from-primary to-primary-container text-on-primary px-8 py-3.5 rounded-xl font-headline font-bold shadow-lg shadow-primary/20 active:scale-95 transition-transform">
            Next Step
            <span class="material-symbols-outlined text-[18px]" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
<!-- Hidden on Mobile Bottom Nav (As per logic: suppressed for focused journeys, but keeping shell for structural requirement if it were top-level) -->
<!-- We suppress global nav because this is a focused task/transactional flow -->
</body></html>
