services:
  # 1. The Backend (Web Service)
  - type: web
    name: project-x-backend
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false # You must set this in the Render Dashboard manually!
      - key: JWT_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
    autoDeploy: true

  # 2. The Frontend (Static Site)
  - type: web
    name: project-x-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    autoDeploy: true
